{{- if .Values.productService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.productService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "product-module.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.productService.name }}
spec:
  type: {{ .Values.productService.service.type }}
  ports:
    - port: {{ .Values.productService.service.port }}
      targetPort: {{ .Values.productService.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Values.productService.name }}
    {{- include "product-module.selectorLabels" . | nindent 4 }}
{{- end }}
