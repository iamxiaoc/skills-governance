# 全局配置
global:
  namespace: default
  imageRegistry: registry.corp.com
  imagePullPolicy: Always
  imagePullSecrets:
    - name: corp-registry-secret
  storageClass: standard

# 微服务通用配置
common:
  replicas: 2
  healthCheck:
    enabled: true
    livenessProbe:
      httpGet:
        path: /actuator/health/liveness
        port: 8080
      initialDelaySeconds: 60
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 5

# order-service 配置
orderService:
  enabled: true
  name: order-service
  replicaCount: 3
  image:
    repository: registry.corp.com/order/order-service
    tag: "1.0.0-SNAPSHOT"
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  resources:
    limits:
      cpu: 1500m
      memory: 2Gi
    requests:
      cpu: 300m
      memory: 512Mi
  env:
    - name: JAVA_OPTS
      value: "-Xms512m -Xmx1536m -Dfile.encoding=UTF-8"
    - name: SPRING_PROFILES_ACTIVE
      value: "prod"
  configMountPath: /app/config
  config:
    db:
      url: "jdbc:mysql://mysql.default.svc.cluster.local:3306/order_db?useSSL=true&characterEncoding=utf8"
      username: "order_app"
      password: "ENC(xxxxx)"
      slaveUrl: "jdbc:mysql://mysql-slave.default.svc.cluster.local:3306/order_db?useSSL=true&characterEncoding=utf8"
      slaveUsername: "order_app_read"
      slavePassword: "ENC(xxxxx)"
    redis:
      nodes: "redis.default.svc.cluster.local:6379"
    mq:
      namesrv: "rocketmq.default.svc.cluster.local:9876"
    api:
      authRequiredPaths:
        - "/api/orders/**"
      publicPaths:
        - "/api/internal/**"
        - "/actuator/**"
      rateLimitQps: 2000
      rateLimitThreads: 500
    protection:
      enabled: true
      cpuThreshold: 80
      memoryThreshold: 85
      globalQps: 10000
      perIpQps: 200
      perUserQps: 100

# order-payment-service 配置
orderPaymentService:
  enabled: true
  name: order-payment-service
  replicaCount: 2
  image:
    repository: registry.corp.com/order/order-payment-service
    tag: "1.0.0-SNAPSHOT"
  service:
    type: ClusterIP
    port: 8082
    targetPort: 8082
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  env:
    - name: JAVA_OPTS
      value: "-Xms256m -Xmx768m -Dfile.encoding=UTF-8"
    - name: SPRING_PROFILES_ACTIVE
      value: "prod"
  configMountPath: /app/config
  config:
    db:
      url: "jdbc:mysql://mysql.default.svc.cluster.local:3306/order_db?useSSL=true&characterEncoding=utf8"
      username: "order_app"
      password: "ENC(xxxxx)"
    alipay:
      appId: "2021000xxxxx"
      privateKey: "ENC(xxxxx)"
      publicKey: "ENC(xxxxx)"
      gateway: "https://openapi.alipay.com/gateway.do"
    api:
      authRequiredPaths:
        - "/api/payments/**"
      publicPaths:
        - "/actuator/**"
      rateLimitQps: 1000
      rateLimitThreads: 200
    protection:
      enabled: true
      cpuThreshold: 80
      memoryThreshold: 85
      globalQps: 3000
      perIpQps: 100
      perUserQps: 50

# Ingress 配置
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: order-api.corp.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: order-service
          servicePort: 8080
    - host: payment-api.corp.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: order-payment-service
          servicePort: 8082

# HPA 配置
hpa:
  enabled: true
  orderService:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 65
  orderPaymentService:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
