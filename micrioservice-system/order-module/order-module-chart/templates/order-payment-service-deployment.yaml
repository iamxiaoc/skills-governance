{{- if .Values.orderPaymentService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.orderPaymentService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "order-module.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.orderPaymentService.name }}
spec:
  replicas: {{ .Values.orderPaymentService.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.orderPaymentService.name }}
      {{- include "order-module.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ .Values.orderPaymentService.name }}
        {{- include "order-module.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.orderPaymentService.name }}
          image: {{ include "order-module.image" .Values.orderPaymentService.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.orderPaymentService.service.targetPort }}
              protocol: TCP
          {{- with .Values.orderPaymentService.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: app-config-volume
              mountPath: {{ .Values.orderPaymentService.configMountPath }}/application.xml
              subPath: application.xml
              readOnly: true
            - name: datasource-config-volume
              mountPath: {{ .Values.orderPaymentService.configMountPath }}/datasource.properties
              subPath: datasource.properties
              readOnly: true
            - name: datasource-config-volume
              mountPath: {{ .Values.orderPaymentService.configMountPath }}/payment.properties
              subPath: payment.properties
              readOnly: true
            - name: log-config-volume
              mountPath: {{ .Values.orderPaymentService.configMountPath }}/log4j2.xml
              subPath: log4j2.xml
              readOnly: true
            - name: log-config-volume
              mountPath: {{ .Values.orderPaymentService.configMountPath }}/log.properties
              subPath: log.properties
              readOnly: true
            - name: api-config-volume
              mountPath: {{ .Values.orderPaymentService.configMountPath }}/api-exposure.xml
              subPath: api-exposure.xml
              readOnly: true
            - name: protection-config-volume
              mountPath: {{ .Values.orderPaymentService.configMountPath }}/overload-protection.json
              subPath: overload-protection.json
              readOnly: true
          {{- if .Values.common.healthCheck.enabled }}
          livenessProbe:
            {{- toYaml .Values.common.healthCheck.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.common.healthCheck.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.orderPaymentService.resources | nindent 12 }}
      volumes:
        - name: app-config-volume
          configMap:
            name: {{ .Values.orderPaymentService.name }}-app-config
            defaultMode: 0644
        - name: datasource-config-volume
          configMap:
            name: {{ .Values.orderPaymentService.name }}-datasource-config
            defaultMode: 0644
        - name: log-config-volume
          configMap:
            name: {{ .Values.orderPaymentService.name }}-log-config
            defaultMode: 0644
        - name: api-config-volume
          configMap:
            name: {{ .Values.orderPaymentService.name }}-api-config
            defaultMode: 0644
        - name: protection-config-volume
          configMap:
            name: {{ .Values.orderPaymentService.name }}-protection-config
            defaultMode: 0644
{{- end }}
