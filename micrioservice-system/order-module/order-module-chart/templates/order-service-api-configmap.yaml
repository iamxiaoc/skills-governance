{{- if .Values.orderService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.orderService.name }}-api-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "order-module.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.orderService.name }}
    app.kubernetes.io/config-type: api
data:
  api-exposure.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <api-config>
        <exposure>
            <paths>
                {{- range .Values.orderService.config.api.authRequiredPaths }}
                <path pattern="{{ . }}" enabled="true" authRequired="true"/>
                {{- end }}
                {{- range .Values.orderService.config.api.publicPaths }}
                <path pattern="{{ . }}" enabled="true" authRequired="false"/>
                {{- end }}
            </paths>
            <rate-limit qps="{{ .Values.orderService.config.api.rateLimitQps }}" threads="{{ .Values.orderService.config.api.rateLimitThreads }}"/>
        </exposure>
        <doc>
            <knife4j enabled="true" title="订单服务API" version="1.0.0"/>
        </doc>
    </api-config>
{{- end }}
