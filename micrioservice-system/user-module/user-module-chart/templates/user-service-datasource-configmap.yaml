{{- if .Values.userService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.userService.name }}-datasource-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "user-module.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.userService.name }}
    app.kubernetes.io/config-type: datasource
data:
  datasource.properties: |
    # 数据源连接池配置（魔改HikariCP）
    pool.name=UserDataSource
    pool.maximum-pool-size=50
    pool.minimum-idle=5
    pool.connection-timeout=60000
    pool.idle-timeout=300000
    pool.max-lifetime=1200000
    pool.connection-test-query=SELECT 1
    # 慢SQL监控
    monitor.slow-sql-threshold-millis=1000
    monitor.log-slow-sql=true
  redis.properties: |
    # Redis配置
    redis.cluster.nodes={{ .Values.userService.config.redis.nodes }}
    redis.timeout=3000
    redis.maxAttempts=3
    redis.maxIdle=50
    redis.minIdle=10
    redis.maxTotal=200
    redis.maxWaitMillis=3000
    redis.testOnBorrow=true
    redis.testWhileIdle=true
{{- end }}
